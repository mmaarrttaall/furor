<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>FUROR</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <!-- INICIO -->
  <div id="inicio" class="pantalla">
    <h1>FUROR</h1>

    <label>Nombre d’equips</label>
    <select id="numEquipos">
      <option value="2">2 equips</option>
      <option value="3">3 equips</option>
      <option value="4">4 equips</option>
    </select>

    <div id="nombresEquipos"></div>

    <h2>Tria la prova inicial</h2>

    <div class="selector-proves">
      <button id="btnInicialParaula" class="boto-prova-inicial seleccionat"
        onclick="seleccionarPruebaInicial('paraula')">
        Cançó amb paraula
      </button>

      <button id="btnInicialLletra" class="boto-prova-inicial"
        onclick="seleccionarPruebaInicial('lletra')">
        Lletra oculta
      </button>

      <button id="btnInicialAny" class="boto-prova-inicial"
        onclick="seleccionarPruebaInicial('any')">
        Títol i autor
      </button>
    </div>

    <br>

    <button onclick="empezarJuego()">Comença a jugar</button>
  </div>

  <!-- JUEGO -->
  <div id="juego" class="pantalla oculto">

    <div class="menu-lateral">
      <button onclick="cambiarPrueba('paraula')">Paraula</button>
      <button onclick="cambiarPrueba('lletra')">Lletra</button>
      <button onclick="cambiarPrueba('any')">Títol i autor</button>
      <button class="boto-seguent" onclick="siguienteRonda()">Següent ronda</button>
    </div>

    <h3 id="tituloPrueba"></h3>
    <h2 id="tituloRonda"></h2>

    <div id="contenidoPrueba"></div>

    <div id="ganador">Esperant pulsador...</div>

    <div class="barra-inferior">
      <div class="marcador" id="marcador"></div>

      <div class="botones-control">
        <button onclick="darPunto()">+1</button>
        <button onclick="quitarPunto()">-1</button>
        <button onclick="reiniciarPulsadores()">Reset</button>
      </div>
    </div>

  </div>

</div>

<script src="pruebas/paraula.js"></script>
<script src="pruebas/lletra.js"></script>
<script src="pruebas/any.js"></script>
<script src="app.js"></script>

</body>
</html>
